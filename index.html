<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alumni Registration Form</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#d9cdbb;
    display:flex;
    justify-content:center;
}

.container{
    width:700px;
    background:#d9cdbb;
    padding:30px;
}

h1{
    color:#7a5437;
    margin-bottom:25px;
}

label{
    display:block;
    margin-top:15px;
    margin-bottom:5px;
    color:#5e4b3c;
}

input, select, textarea{
    width:100%;
    padding:12px;
    border:1px solid #bba98d;
    border-radius:5px;
    box-sizing:border-box;
    background:#eee8df;
}

.row{
    display:flex;
    gap:15px;
}

.row input{
    width:100%;
}

.radio-group{
    margin-top:10px;
}

.radio-group label{
    display:inline;
    margin-right:20px;
}

textarea{
    height:90px;
    resize:none;
}

.address-row{
    display:flex;
    gap:15px;
    margin-top:10px;
}

button{
    display:block;
    margin:30px auto;
    padding:14px 40px;
    background:#7a5437;
    color:white;
    border:none;
    border-radius:25px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#5f4028;
}

.error{
    color:red;
    font-size:13px;
}

</style>
</head>

<body>

<div class="container">

<h1>Alumni Registration Form</h1>

<form id="alumniForm">

<label>Name</label>
<div class="row">
<input type="text" id="firstName" placeholder="First">
<input type="text" id="lastName" placeholder="Last">
</div>

<label>Phone</label>
<input type="text" id="phone" placeholder="### ### ####">

<label>Year of Passing</label>
<input type="number" id="year">

<label>Birth Date</label>
<input type="date" id="birth">

<label>Marital Status</label>
<div class="radio-group">
<input type="radio" name="marital" value="Single"> Single
<input type="radio" name="marital" value="Married"> Married
</div>

<label>Profession</label>
<input type="text" id="profession">

<label>Address</label>
<input type="text" placeholder="Street Address">

<input type="text" placeholder="Street Address Line 2" style="margin-top:10px;">

<div class="address-row">
<input type="text" placeholder="City">
<input type="text" placeholder="Region">
</div>

<div class="address-row">
<input type="text" placeholder="Postal / Zip Code">

<select>
<option>Romania</option>
<option>USA</option>
<option>India</option>
<option>UK</option>
</select>
</div>

<label>Where did life take you after [Institution Name]?</label>
<textarea></textarea>

<label>Fondest memories of life at [Institution Name]</label>
<textarea></textarea>

<button type="submit">REGISTER</button>

<p id="message"></p>

</form>

</div>

<script>

document.getElementById("alumniForm").addEventListener("submit", function(e){

e.preventDefault();

let first = document.getElementById("firstName").value;
let last = document.getElementById("lastName").value;
let phone = document.getElementById("phone").value;
let year = document.getElementById("year").value;

let message = document.getElementById("message");

if(first === "" || last === "" || phone === "" || year === ""){
    message.innerHTML = "Please fill all required fields.";
    message.style.color = "red";
}
else{
    message.innerHTML = "Registration Successful!";
    message.style.color = "green";
}

});

</script>

</body>
</html>
