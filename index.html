<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Greeting Card</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card" id="card">
    <div class="outside">
        <h1>🎉 Happy Day 🎉</h1>
        <p>Click to Open</p>
    </div>

    <div class="inside">
        <h2>Best Wishes!</h2>
        <p id="message">Wishing you happiness and success in everything you do!</p>
        <button onclick="changeMessage()">New Message</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
