<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link rel="stylesheet" href="style.css" />
    <title>Static Template</title>
  </head>
  <body>
    <div class="coder-cat">
      <div class="head">
        <div class="head-inner"></div>
        <div class="ear-left"></div>
        <div class="ear-right"></div>
        <div class="hair-left-1"></div>
        <div class="hair-left-2"></div>
        <div class="hair-right-1"></div>
        <div class="hair-right-2"></div>
        <div class="hat">
          <div class="hat-ribbon"></div>
          <div class="hat-stripe-left"></div>
          <div class="hat-stripe-right"></div>
        </div>
        <div class="face">
          <div class="eye-left">
            <div class="pupil"></div>
          </div>
          <div class="eye-right"></div>
          <div class="nose"></div>
          <div class="mouth"></div>
        </div>
      </div>
      <div class="body">
        <div class="over-coat"></div>
        <div class="button"></div>
        <div class="collar-left-front"></div>
        <div class="collar-left-back"></div>
        <div class="collar-right-front"></div>
        <div class="collar-right-back"></div>
      </div>
      <div class="hand-left">
        <div class="palm">
          <div class="dot-2"></div>
          <div class="dot-3"></div>
          <div class="dot-4"></div>
        </div>
      </div>
      <div class="magnifier">
        <div class="handle"></div>
        <div class="lens-cover">
          <div class="lens">
            <div class="shadow"></div>
          </div>
        </div>
      </div>
      <div class="ipad">
        <div class="control c-1"></div>
        <div class="control c-2"></div>
        <div class="control c-3"></div>
        <div class="left-tag"></div>
        <div class="right-tag"></div>
      </div>
      <div class="hand-right"></div>
    </div>
  </body>
</html>
